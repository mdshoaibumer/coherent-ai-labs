name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci --legacy-peer-deps
      
    - name: Lint
      run: npm run lint
      
    - name: Type Check
      run: npx tsc --noEmit
      
    - name: Unit Tests
      run: npx vitest run
      
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
      
    - name: E2E Tests
      run: npx playwright test
      
    - name: Build Production
      run: npm run build
